function drawLevelThumbnail(canvas, levelData){
  const tw=canvas.width, th=canvas.height;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#0a0a0f'; ctx.fillRect(0,0,tw,th);

  if(!levelData || !levelData.bricks || !levelData.bricks.length) return;

  // Find grid extents from col/row
  const srcW = levelData.bricks[0].w || BRICK_W;
  const srcH = levelData.bricks[0].h || BRICK_H;
  const cols = BRICK_COLS, rows = BRICK_ROWS;
  const cw = tw/cols, ch = th/rows;

  levelData.bricks.forEach(b=>{
    const col = b.col !== undefined ? b.col : Math.round(b.x/srcW);
    const row = b.row !== undefined ? b.row : Math.round(b.y/srcH);
    if(col<0||col>=cols||row<0||row>=rows) return;
    let color;
    if(b.isSteel)   color='#8a9bb0';
    else if(b.isDiamond) color='#00eeff';
    else if(b.isSkull)   color='#222';
    else if(b.isWhite)   color='#e8e8f0';
    else if(b.isLock)    color='#b8860b';
    else if(b.isKey)     color='#ffd700';
    else if(b.isReverse) color='#888899';
    else color=b.color||'#888';
    ctx.fillStyle=color;
    ctx.fillRect(col*cw+0.5, row*ch+0.5, cw-1, ch-1);
  });

  // Draw ball
  const ballCol = levelData.ballCol !== undefined ? levelData.ballCol : Math.round((levelData.ballX||0)/srcW);
  const ballRow = levelData.ballRow !== undefined ? levelData.ballRow : Math.round((levelData.ballY||0)/srcH);
  ctx.fillStyle='#ffffff';
  ctx.beginPath();
  ctx.arc(ballCol*cw+cw/2, ballRow*ch+ch/2, Math.max(1.5,cw*0.4), 0, Math.PI*2);
  ctx.fill();
}

function renderLevelList(){
  const list=document.getElementById('levelList');
  list.innerHTML='';

  const groups=[];
  const featuredName = getFeaturedSeriesName();

  // Featured series goes first with progression locks
  const featuredSeriesObj = savedSeries().find(s=>s.name===featuredName);
  if(featuredSeriesObj){
    groups.push({ name:featuredSeriesObj.name, levels:featuredSeriesObj.levels, isSeries:true, seriesObj:featuredSeriesObj, progressLocked:true, isFeatured:true });
  }

  // All other series
  savedSeries().forEach(s=>{
    if(s.name === featuredName) return;
    groups.push({ name:s.name, levels:s.levels, isSeries:true, seriesObj:s, progressLocked: isReceivedSeries(s) });
  });

  // Standalone maps: owned by this user and not in any series
  const allSeriesLevelNames=new Set(savedSeries().flatMap(s=>s.levels.map(l=>l.name)));
  const customMaps=savedLevels().filter(lv=>!allSeriesLevelNames.has(lv.name) && isOwnedMap(lv));
  if(customMaps.length) groups.push({ name:'My Maps', levels:customMaps, isSeries:false, seriesObj:null, progressLocked:false });

  if(!groups.length){
    list.innerHTML='<div style="color:#888;font-size:11px;text-align:center;width:100%;padding:20px 0;line-height:1.8;">No maps yet.<br>Use Map Builder to create one!</div>';
    return;
  }

  const openState={};

  function renderAccordions(){
    list.innerHTML='';
    groups.forEach((group, gi)=>{
      const progress = group.progressLocked ? getSeriesProgress(group.name) : Infinity;
      const isOpen = !!openState[gi];

      const header=document.createElement('div');
      header.style.cssText=`

  </div>`;

  const dots=ov.querySelectorAll('.pdot');

  function updateDots(){
    dots.forEach((d,i)=>{ d.style.background=i<entered.length?'#f5c842':'transparent'; });
  }

  function shake(){
    const panel=ov.querySelector('#pinPanel');
    panel.style.transition='transform 0.08s';
    const seq=[8,-8,6,-6,4,-4,0];
    let i=0;
    const next=()=>{ panel.style.transform=`translateX(${seq[i]}px)`; i++; if(i<seq.length) setTimeout(next,60); };
    next();
    // Flash dots red
    dots.forEach(d=>{ d.style.background='#e63946'; d.style.borderColor='#e63946'; });
    setTimeout(()=>{ entered=''; updateDots(); dots.forEach(d=>{ d.style.borderColor='rgba(200,160,60,0.4)'; }); }, 500);

  ov.querySelectorAll('.pinKey').forEach(btn=>{

function buildPalette(){
  const pal=document.getElementById('palette');
  pal.innerHTML='';

  // Size items to match game bricks exactly * 1.15, 2 per row
  const iW=Math.round(BRICK_W*1.15), iH=Math.round(BRICK_H*1.15);
  const palW=iW*2+3*3; // 2 items + 3 gaps of 3px
  pal.style.width=palW+'px';

  // Update drawer close translation
  document.getElementById('paletteDrawer').style.setProperty('--drawer-w', palW+'px');

  function palImg(imgKey, type, color, title){
    const el=document.createElement('div');
    el.className='pal-item'; el.title=title||type; el.dataset.type=type;
    if(color) el.dataset.color=color;
    el.style.width=iW+'px'; el.style.height=iH+'px';
    const img=BRICK_IMAGES[imgKey];
    if(img){
      el.style.backgroundImage=`url(${img.src})`;
      el.style.backgroundSize='100% 100%';
      el.style.backgroundPosition='center';
    }
    el.addEventListener('click',()=>{ selectedTool={type,color:color||null}; refreshPalSelection(); });
    pal.appendChild(el); return el;
  }

  // Eraser - same size as other items, bigger icon
  const eraserEl=document.createElement('div');
  eraserEl.className='pal-item pal-eraser'; eraserEl.title='Erase'; eraserEl.dataset.type='eraser';
  eraserEl.style.width=iW+'px'; eraserEl.style.height=iH+'px';
  eraserEl.innerHTML='<span style="font-family:\'Cinzel\',serif;font-size:9px;color:rgba(200,160,60,0.9);letter-spacing:1px;font-weight:600;">ERASE</span>';
  eraserEl.addEventListener('click',()=>{ selectedTool={type:'eraser',color:null}; refreshPalSelection(); });
  pal.appendChild(eraserEl);

  addPalSep(pal);

  // Color bricks + white = 6 items, 2 per row = 3 rows
  COLORS.forEach(col=>{ palImg(COLOR_IMG[col],'color',col,'Color brick'); });
  palImg('white','white','#ffffff','White brick (white ball only)');

  addPalSep(pal);

  // Paint bricks - 5 items, 2 per row
  COLORS.forEach(col=>{ palImg(PAINT_IMG[col],'paint',col,'Paint brick'); });

  addPalSep(pal);

  // Specials - 2 per row
  palImg('steel',  'steel',  null,    'Steel (indestructible)');
  palImg('key',    'key',    null,    'Key brick');
  palImg('lock',   'lock',   null,    'Lock brick (needs a key)');
  palImg('skull',  'skull',  '#000000','Skull (kills ball)');
  palImg('reverse','reverse','#888899','Reverse brick (flips controls)');
  palImg('bomb',   'bomb',   '#ff6600','Bomb brick');
  palImg('diamond','diamond','#00eeff','Diamond (collectible)');

  addPalSep(pal);

  // Ball start
  const ballEl=document.createElement('div');
  ballEl.className='pal-item'; ballEl.title='Ball start position'; ballEl.dataset.type='ball';
  ballEl.style.width=iW+'px'; ballEl.style.height=iH+'px';
  ballEl.style.background='rgba(15,10,5,0.9)';
  ballEl.style.display='flex'; ballEl.style.alignItems='center'; ballEl.style.justifyContent='center';
  const ballPreview=document.createElement('canvas');
  const br=Math.round(Math.min(iW,iH)*0.32);
  ballPreview.width=br*2+2; ballPreview.height=br*2+2;
  ballPreview.style.width=ballPreview.width+'px'; ballPreview.style.height=ballPreview.height+'px';
  const bpc=ballPreview.getContext('2d');
  const bx=br+1, by=br+1;
  const base=bpc.createRadialGradient(bx,by+br*0.3,0,bx,by,br);
  base.addColorStop(0,'rgba(230,230,255,1)'); base.addColorStop(0.5,'rgba(180,190,230,1)'); base.addColorStop(1,'rgba(100,110,170,1)');
  bpc.fillStyle=base; bpc.beginPath(); bpc.arc(bx,by,br,0,Math.PI*2); bpc.fill();
  const rim=bpc.createRadialGradient(bx,by+br*0.7,0,bx,by+br*0.5,br*0.9);
  rim.addColorStop(0,'rgba(255,255,255,0.7)'); rim.addColorStop(1,'rgba(0,0,0,0)');
  bpc.fillStyle=rim; bpc.beginPath(); bpc.arc(bx,by,br,0,Math.PI*2); bpc.fill();
  const spec=bpc.createRadialGradient(bx-br*0.3,by-br*0.35,0,bx-br*0.3,by-br*0.35,br*0.45);
  spec.addColorStop(0,'rgba(255,255,255,1)'); spec.addColorStop(1,'rgba(255,255,255,0)');
  bpc.fillStyle=spec; bpc.beginPath(); bpc.arc(bx,by,br,0,Math.PI*2); bpc.fill();
  bpc.strokeStyle='rgba(180,200,255,0.5)'; bpc.lineWidth=1;
  bpc.beginPath(); bpc.arc(bx,by,br,0,Math.PI*2); bpc.stroke();
  ballEl.appendChild(ballPreview);
  ballEl.addEventListener('click',()=>{ selectedTool={type:'ball',color:null}; refreshPalSelection(); });
  pal.appendChild(ballEl);

  // Background selector button — full-width across both columns
  const sep=document.createElement('div');
  sep.style.cssText='width:'+palW+'px;height:1px;background:rgba(255,215,0,0.25);margin:4px 0 2px 0;flex-shrink:0;';
  pal.appendChild(sep);
  const bgBtn=document.createElement('div');
  bgBtn.id='bgPickerBtn';
  bgBtn.style.cssText='width:'+palW+'px;height:'+Math.round(iH*0.75)+'px;background:rgba(20,15,5,0.9);border:1px solid #8a6a20;border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;gap:6px;padding:0 8px;box-sizing:border-box;flex-shrink:0;';

  bgBtnText.textContent=builderBackground;
  bgBtn.appendChild(bgIcon); bgBtn.appendChild(bgBtnText);
  bgBtn.addEventListener('click',()=>{ showBgPicker(); });

  refreshPalSelection();
}

function refreshPalSelection(){

function gridFromBricks(brickArr){
  const grid={};
  brickArr.forEach(b=>{ grid[`${b.col},${b.row}`]=b; });
  return grid;
}

function drawBuilder(){
  if(!builderOpen) return;
  const bW=bCanvas.width/DPR, bH=bCanvas.height/DPR;
  // Use exact game brick size so bricks aren't stretched
  const cellW=BRICK_W, cellH=BRICK_H;

  // Draw game background
  const _bgSrc = BACKGROUNDS[builderBackground] || BG_IMAGE.src;
  if(!builderBgImage || builderBgImage.src !== _bgSrc){
    builderBgImage = new Image();
    builderBgImage.onload = ()=>{ drawBuilder(); };
    builderBgImage.src = _bgSrc;
  }
  if(builderBgImage.complete && builderBgImage.naturalWidth>0){
    const scaleX = bW / builderBgImage.naturalWidth;
    const scaleY = bH / builderBgImage.naturalHeight;
    const scale = Math.max(scaleX, scaleY);
    const drawW = builderBgImage.naturalWidth * scale;
    const drawH = builderBgImage.naturalHeight * scale;
    const drawX = (bW - drawW) / 2;
    const drawY = (bH - drawH) / 2;
    bCtx.drawImage(builderBgImage, drawX, drawY, drawW, drawH);
    bCtx.fillStyle='rgba(0,0,0,0.45)'; bCtx.fillRect(0,0,bW,bH);
  } else {
    bCtx.fillStyle='#0a0804'; bCtx.fillRect(0,0,bW,bH);
  }

  // Subtle grid lines over grid area only
  bCtx.strokeStyle='rgba(255,255,255,0.08)'; bCtx.lineWidth=0.5;
  for(let c=0;c<=BUILDER_COLS;c++){ bCtx.beginPath();bCtx.moveTo(c*cellW,0);bCtx.lineTo(c*cellW,BUILDER_ROWS*cellH);bCtx.stroke(); }
  for(let r=0;r<=BUILDER_ROWS;r++){ bCtx.beginPath();bCtx.moveTo(0,r*cellH);bCtx.lineTo(BUILDER_COLS*cellW,r*cellH);bCtx.stroke(); }

  // Bricks
  const grid=gridFromBricks(builderBricks);
  for(let r=0;r<BUILDER_ROWS;r++){
    for(let c=0;c<BUILDER_COLS;c++){
      const key=`${c},${r}`;
      if(!grid[key]) continue;
      const b=grid[key];
      const drawB={ x:c*cellW, y:r*cellH, w:cellW, h:cellH,
                    color:b.color, isPaint:b.isPaint, isSteel:b.isSteel,
                    isKey:b.isKey, isLock:b.isLock, isDiamond:b.isDiamond,
                    isWhite:b.isWhite, isSkull:b.isSkull, isReverse:b.isReverse, isBomb:b.isBomb, cooldown:0 };
      drawBrick(bCtx,drawB);
    }
  }

  // Ball - use the same drawBall function as gameplay
  const ballPx=builderBallPos.col*cellW+cellW/2, ballPy=builderBallPos.row*cellH+cellH/2;
  drawBall(bCtx, {x:ballPx, y:ballPy, color:'#ffffff', trail:[]});

  // Cursor highlight
  if(builderHover){
    bCtx.strokeStyle='rgba(245,200,66,0.7)'; bCtx.lineWidth=2;
    bCtx.strokeRect(builderHover.c*cellW+1,builderHover.r*cellH+1,cellW-2,cellH-2);
    bCtx.lineWidth=1;
  }
}

let paletteDrawerOpen = true;
let builderHover=null, builderPainting=false;

function togglePaletteDrawer(){
  paletteDrawerOpen = !paletteDrawerOpen;
  const drawer = document.getElementById('paletteDrawer');
  const pal = document.getElementById('palette');
  const palW = pal.offsetWidth || (BRICK_W*2+9);
  if(paletteDrawerOpen){
    drawer.style.transform='translateX(0)';
  } else {
    drawer.style.transform=`translateX(${palW}px)`;
  }
}

document.getElementById('paletteTab').addEventListener('click', togglePaletteDrawer);

function builderCellFromEvent(e){
  const rect=bCanvas.getBoundingClientRect();
  const x=(e.clientX-rect.left), y=(e.clientY-rect.top);
  const palW = document.getElementById('palette').offsetWidth || (BRICK_W*2+9);
  if(paletteDrawerOpen && x > rect.width - palW) return null;
  const c=Math.floor(x/BRICK_W), r=Math.floor(y/BRICK_H);
  if(c<0||c>=BUILDER_COLS||r<0||r>=BUILDER_ROWS) return null;
  return {c,r};
}

function isClearZone(c,r){
  return Math.abs(c-builderBallPos.col)<=1 && Math.abs(r-builderBallPos.row)<=1;
}

function builderApplyTool(cell){
  if(!cell) return;
  if(selectedTool.type==='ball'){
    builderBallPos={ col:cell.c, row:cell.r };
    drawBuilder(); return;
  }
  const idx=builderBricks.findIndex(b=>b.col===cell.c&&b.row===cell.r);
  if(selectedTool.type==='eraser'){
    if(idx>=0) builderBricks.splice(idx,1);
  } else {
    const entry={ col:cell.c, row:cell.r,
      color:selectedTool.color||COLORS[0],
      isPaint:selectedTool.type==='paint',
      isSteel:selectedTool.type==='steel',
      isKey:selectedTool.type==='key',
      isLock:selectedTool.type==='lock',
      isDiamond:selectedTool.type==='diamond',
      isWhite:selectedTool.type==='white',
      isSkull:selectedTool.type==='skull',
      isReverse:selectedTool.type==='reverse',
      isBomb:selectedTool.type==='bomb' };
    if(idx>=0) builderBricks[idx]=entry; else builderBricks.push(entry);
  }
  drawBuilder();
}

bCanvas.addEventListener('pointerdown',e=>{
  const cell=builderCellFromEvent(e);
  if(!cell) return;
  e.preventDefault();
  builderPainting=true; builderHover=cell; builderApplyTool(cell);
});
bCanvas.addEventListener('pointermove',e=>{ builderHover=builderCellFromEvent(e); if(builderPainting) builderApplyTool(builderHover); else drawBuilder(); });
bCanvas.addEventListener('pointerup',  ()=>{ builderPainting=false; });
bCanvas.addEventListener('pointerleave',()=>{ builderHover=null; builderPainting=false; drawBuilder(); });

let builderCurrentLevelName=null; // name of the level currently loaded in builder

function loadLevelIntoBuilder(lv){
  const srcW = lv.bricks.length ? (lv.bricks[0].w || BRICK_W) : BRICK_W;
  const srcH = lv.bricks.length ? (lv.bricks[0].h || BRICK_H) : BRICK_H;
  builderBricks=lv.bricks.map(b=>({
    col:Math.round(b.x/srcW), row:Math.round(b.y/srcH),
    color:b.color, isPaint:!!b.isPaint, isSteel:!!b.isSteel,
    isKey:!!b.isKey, isLock:!!b.isLock, isDiamond:!!b.isDiamond,
    isWhite:!!b.isWhite, isSkull:!!b.isSkull, isReverse:!!b.isReverse, isBomb:!!b.isBomb
  }));
  if(lv.portal){
    const pc={col:Math.round(lv.portal.x/srcW), row:Math.round(lv.portal.y/srcH)};
    if(!builderBricks.find(b=>b.col===pc.col&&b.row===pc.row)){
      builderBricks.push({col:pc.col,row:pc.row,color:'#00eeff',
        isPaint:false,isSteel:false,isKey:false,isLock:false,isDiamond:true});
    }
  }
  if(lv.ballCol !== undefined){
    builderBallPos={ col:lv.ballCol, row:lv.ballRow };
  } else if(lv.ballX!=null){
    const srcW = lv.bricks.length ? (lv.bricks[0].w || BRICK_W) : BRICK_W;
    const srcH = lv.bricks.length ? (lv.bricks[0].h || BRICK_H) : BRICK_H;
    builderBallPos={ col:Math.round(lv.ballX/srcW), row:Math.round(lv.ballY/srcH) };
  }
  builderPortalPos=null;
  builderCurrentLevelName=lv.name;

  drawBuilder();
}

// Inline rename popup - appears near the tapped element
function showRenamePopup(anchorEl, currentName, onSave) {
  const existing = document.getElementById('renamePopup');
  if(existing) existing.remove();

  const pop = document.createElement('div');
  pop.id = 'renamePopup';
  pop.style.cssText=`position:fixed;z-index:600;background:#1a1206;border:1px solid rgba(200,160,60,0.7);border-radius:4px;padding:10px;display:flex;gap:8px;align-items:center;box-shadow:0 4px 20px rgba(0,0,0,0.7);`;

  pop.innerHTML=`
    <input id="renameInput" value="${currentName.replace(/"/g,'&quot;')}" maxlength="40"
      style="background:#0a0804;border:1px solid rgba(200,160,60,0.5);color:#f5c842;font-family:'Lato',sans-serif;font-size:14px;font-weight:700;padding:7px 10px;border-radius:3px;outline:none;width:200px;">
    <button id="renameSave" style="background:#2ec4b6;border:none;color:#000;font-family:'Lato',sans-serif;font-weight:700;font-size:13px;padding:7px 14px;border-radius:3px;cursor:pointer;flex-shrink:0;">Save</button>
    <button id="renameCancel" style="background:none;border:none;color:rgba(180,140,60,0.5);font-family:'Lato',sans-serif;font-size:18px;cursor:pointer;line-height:1;padding:0 2px;flex-shrink:0;">×</button>`;

  document.body.appendChild(pop);

  // Position near the anchor element
  const rect = anchorEl.getBoundingClientRect();
  const popW = 320;
  let left = rect.left;
  let top = rect.bottom + 6;
  if(left + popW > window.innerWidth - 8) left = window.innerWidth - popW - 8;
  if(top + 60 > window.innerHeight - 8) top = rect.top - 66;
  pop.style.left = left + 'px';
  pop.style.top  = top + 'px';

  const input = pop.querySelector('#renameInput');
  input.focus();
  input.select();

  const doSave = () => {
    const val = input.value.trim();
    if(val && val !== currentName) onSave(val);
    pop.remove();
  };

  pop.querySelector('#renameSave').addEventListener('click', doSave);
  pop.querySelector('#renameCancel').addEventListener('click', ()=>pop.remove());
  input.addEventListener('keydown', e=>{ if(e.key==='Enter') doSave(); if(e.key==='Escape') pop.remove(); });

  // Close if clicking outside (but not the anchor that opened it)
  setTimeout(()=>{
    const outside = e=>{ if(!pop.contains(e.target) && e.target!==anchorEl){ pop.remove(); document.removeEventListener('pointerdown', outside); } };
    document.addEventListener('pointerdown', outside);
  }, 200);
}

          ${isFeatured && adminMode ? `<button class="usPush" style="${btnTeal}font-size:11px;padding:5px 10px;" title="Push to cloud quest">☁ Push</button>` : ''}
          <button class="usShare" style="font-family:'Lato',sans-serif;font-weight:700;font-size:11px;cursor:pointer;border-radius:3px;flex-shrink:0;padding:6px 10px;background:rgba(40,28,5,0.95);border:1px solid rgba(245,200,66,0.55);color:#f5c842;letter-spacing:0.5px;">SHARE</button>
          ${locked ? '' : `<button class="usDel" style="${btnDanger}">×</button>`}`;
        row.appendChild(hdr2);

        // Draggable level list
        const lvList=document.createElement('div');
        lvList.style.cssText='display:flex;flex-direction:column;gap:4px;';
        let dragSrcIdx=null;

        function rebuildLvList(){
          lvList.innerHTML='';
          const fresh=savedSeries().find(x=>x.name===s.name);
          if(!fresh) return;
          s=fresh;
          if(isFeatured){ const hc=HARDCODED_SERIES.find(x=>x.name===s.name); if(hc) hc.levels=s.levels; }
          fresh.levels.forEach((l,i)=>{
            const lrow=document.createElement('div');
            lrow.dataset.idx=i;
            lrow.style.cssText=`display:flex;align-items:center;background:#0f0f1a;border:1px solid #333;padding:7px 10px;border-radius:2px;gap:7px;${locked?'':'cursor:grab;user-select:none;'}`;
            if(!locked) lrow.draggable=true;
            lrow.innerHTML=`
              ${locked ? `<span style="color:#333;font-size:14px;">☰</span>` : `<span style="color:#555;font-size:14px;">☰</span>`}
              <span class="lvName" style="color:${locked?'#555':'#aaa'};font-size:13px;font-family:'Lato',sans-serif;flex:1;${locked?'':'cursor:pointer;'}" ${locked?'':'title="Tap to rename"'}>${i+1}. ${l.name||'Level'}</span>
              ${locked ? '' : `<button class="smLoadLv" data-idx="${i}" style="${btnGhost}padding:4px 10px;font-size:12px;">LOAD</button>
              <button class="smRemoveLv" data-idx="${i}" title="Remove from series" style="background:none;border:1px solid rgba(180,80,80,0.4);color:#e66;font-size:18px;line-height:1;padding:2px 8px;border-radius:3px;cursor:pointer;flex-shrink:0;">−</button>`}`;
            if(!locked){
              // RENAME map within series
              lrow.querySelector('.lvName').addEventListener('click', e=>{
                e.stopPropagation();
                showRenamePopup(lrow.querySelector('.lvName'), l.name, newName=>{
                  const t=savedSeries().find(x=>x.name===s.name);
                  if(!t) return;
                  const oldName = l.name;
                  t.levels[i].name = newName;
                  saveSeries(t);
                  // Also rename in standalone saved levels if present
                  const allLevels = savedLevels();
                  const entry = allLevels.find(lv=>lv.name===oldName);
                  if(entry){ entry.name=newName; LS.set('cc_levels', JSON.stringify(allLevels)); upsertMapToCloud(entry).catch(()=>{}); }
                  rebuildLvList();
                  showBuilderToast(`Renamed to "${newName}"`);
                });
              });
              lrow.addEventListener('dragstart',e=>{ dragSrcIdx=i; lrow.style.opacity='0.4'; e.dataTransfer.effectAllowed='move'; });
              lrow.addEventListener('dragend',()=>{ lrow.style.opacity='1'; dragSrcIdx=null; });
              lrow.addEventListener('dragover',e=>{ e.preventDefault(); lrow.style.borderColor='#ffd700'; });
              lrow.addEventListener('dragleave',()=>{ lrow.style.borderColor='#333'; });
              lrow.addEventListener('drop',e=>{
                e.preventDefault(); lrow.style.borderColor='#333';
                if(dragSrcIdx===null||dragSrcIdx===i) return;
                const t=savedSeries().find(x=>x.name===s.name);
                const moved=t.levels.splice(dragSrcIdx,1)[0]; t.levels.splice(i,0,moved);
                saveSeries(t); rebuildLvList();
              });
              lrow.querySelector('.smLoadLv').addEventListener('click',()=>{ ov.remove(); loadLevelIntoBuilder(l); showBuilderToast(`Loaded "${l.name||'Level'}"`); });
              lrow.querySelector('.smRemoveLv').addEventListener('click',()=>{
                const t=savedSeries().find(x=>x.name===s.name); t.levels.splice(i,1); saveSeries(t); rebuildLvList();
              });
            }
            lvList.appendChild(lrow);
          });
          hdr2.querySelector('.seriesCount').textContent=`${s.levels.length} map${s.levels.length!==1?'s':''}`;
        }
        rebuildLvList();
        if(!locked) row.appendChild(lvList);

        // + Add Maps button at bottom of each non-locked series
        if(!locked){
          const addMapsBtn = document.createElement('button');
          addMapsBtn.style.cssText = `background:none;border:1px dashed rgba(46,196,182,0.35);color:#2ec4b6;font-family:'Lato',sans-serif;font-weight:700;font-size:13px;padding:8px;cursor:pointer;border-radius:3px;width:100%;margin-top:2px;`;
          addMapsBtn.textContent = '+ Add Maps';
          addMapsBtn.addEventListener('click', ()=>{ showAddMapsToSeriesOverlay(s.name, rebuildLvList); });
          row.appendChild(addMapsBtn);
        }

        // Push to cloud (admin only, featured series only)
        if(isFeatured && adminMode){
          hdr2.querySelector('.usPush').addEventListener('click', async ()=>{
            const btn=hdr2.querySelector('.usPush');
            const orig=btn.innerHTML; btn.innerHTML='⏳'; btn.disabled=true;
            try {
              const fresh=savedSeries().find(x=>x.name===s.name)||s;
              await upsertCloudSeries(fresh, 0);
              showBuilderToast('☁ Quest pushed to cloud!');
            } catch(e){ showBuilderToast('⚠️ Push failed'); console.error(e); }
            finally { btn.innerHTML=orig; btn.disabled=false; }
          });
        }

        // Set as Featured: long-press the series row (admin only, non-featured)
        if(!isFeatured && adminMode){
          let pressTimer=null;
          const startPress=()=>{ pressTimer=setTimeout(()=>{
            showConfirmOverlay(
              `Set "${s.name}" as the Featured series?`,
              ()=>{
                setFeaturedSeriesName(s.name);
                renderSeriesTab();
                showBuilderToast(`★ "${s.name}" is now the Featured series`);
              }
            );
          }, 600); };
          const cancelPress=()=>{ clearTimeout(pressTimer); };
          row.addEventListener('pointerdown', startPress);
          row.addEventListener('pointerup', cancelPress);
          row.addEventListener('pointerleave', cancelPress);
          row.title='Hold to set as Featured';
        }

        // Rename (not available for locked featured series)
        if(!locked){
          hdr2.querySelector('.usName').addEventListener('click', ()=>{
            showRenamePopup(hdr2.querySelector('.usName'), s.name, newName=>{
              const allSeries = savedSeries();
              const target = allSeries.find(x=>x.name===s.name);
              if(!target) return;
              const oldName = target.name;
              target.name = newName;
              LS.set('cc_series', JSON.stringify(allSeries.map(x=>x.name===oldName ? target : x)));
              if(isFeatured){ const hc=HARDCODED_SERIES.find(x=>x.name===oldName); if(hc) hc.name=newName; }
              renderSeriesTab();
              showBuilderToast(`Renamed to "${newName}"`);
            });
          });
        }

        // Share
        hdr2.querySelector('.usShare').addEventListener('click', async ()=>{
          const btn=hdr2.querySelector('.usShare'); const orig=btn.innerHTML; btn.innerHTML='⏳'; btn.disabled=true;
          try {
            let slug;
            try { slug = await shareSeriesToCloud(s); }
            catch(uploadErr){ console.warn('Series cloud upload failed, using local slug:', uploadErr); slug = slugify(s.name); }
            showShareLinkOverlay('SERIES SHARED!', getSeriesShareUrl(slug));
          } catch(e){ console.error('Series share failed:', e); showBuilderToast('⚠️ Share failed: ' + (e && e.message ? e.message.slice(0,60) : 'unknown error')); }
          finally { btn.innerHTML=orig; btn.disabled=false; }
        });

        // Delete (not available for locked featured series)
        if(!locked){
          hdr2.querySelector('.usDel').addEventListener('click',()=>{
            const ownedNames = new Set(savedLevels().map(l=>l.name));
            const total = s.levels.length;
            const owned = s.levels.filter(l=>ownedNames.has(l.name)).length;
            const unowned = total - owned;
            let msg = `Delete series <strong style="color:#f5c842;">${s.name}</strong>?`;
            if(total > 0){
              msg += `<div style="color:#aaa;font-size:13px;margin-top:8px;line-height:1.6;">This will remove ${total} map${total!==1?'s':''} from your list.`;
              if(unowned > 0) msg += `<br><span style="color:rgba(200,160,60,0.6);font-size:12px;">${unowned} shared map${unowned!==1?'s':''} will only be removed locally.</span>`;
              msg += `</div>`;
            }
            showConfirmOverlay(msg, ()=>{
              // Delete each map locally; cloud delete only for owned maps
              s.levels.forEach(l=>{
                deleteLevel(l.name);
                if(ownedNames.has(l.name)) deleteCloudMapByName(l.name).catch(()=>{});
              });
              deleteSeries(s.name);
              rebuildSeriesTab();
              showBuilderToast(`"${s.name}" deleted`);
            });
          });
        }

        body.appendChild(row);
      });
    }

    // New series button
    const newBtn=document.createElement('button');
    newBtn.style.cssText=`background:none;border:1px dashed rgba(200,160,60,0.3);color:#888;font-family:'Lato',sans-serif;font-weight:700;font-size:14px;padding:12px;cursor:pointer;border-radius:3px;margin-top:6px;`;
    newBtn.textContent='+ New Series';
    newBtn.addEventListener('click',()=>{
      const nameIn=prompt('Series name:'); if(!nameIn||!nameIn.trim()) return;
      const desc=prompt('Description (optional):') || '';
      saveSeries({name:nameIn.trim(),description:desc,levels:[]});
      rebuildSeriesTab();
      showBuilderToast(`Series "${nameIn.trim()}" created!`);
    });
    body.appendChild(newBtn);
  }

  tabMaps.addEventListener('click', renderMapsTab);
  tabSeries.addEventListener('click', renderSeriesTab);

  if(defaultTab==='series') renderSeriesTab(); else renderMapsTab();
}

// Thumbnail map picker - called from + Add Maps button on a series
function showAddMapsToSeriesOverlay(seriesName, onDone){
  const ov = document.createElement('div');
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;box-sizing:border-box;';

  const panel = document.createElement('div');
  panel.style.cssText = "background:#0f0f1a;border:2px solid rgba(200,160,60,0.5);font-family:'Lato',sans-serif;width:min(440px,100%);max-height:90vh;display:flex;flex-direction:column;border-radius:4px;overflow:hidden;";

  // Header
  const hdr = document.createElement('div');
  hdr.style.cssText = "padding:16px 16px 10px;border-bottom:1px solid rgba(200,160,60,0.2);flex-shrink:0;";
  hdr.innerHTML = `<div style="color:#f5c842;font-size:15px;font-family:'Cinzel',serif;font-weight:600;text-align:center;margin-bottom:4px;">ADD MAPS TO SERIES</div>
    <div style="color:#888;font-size:12px;text-align:center;">Tap thumbnails to add to <span style="color:#f5c842;">${seriesName}</span></div>`;
  panel.appendChild(hdr);

  // Thumbnail grid
  const grid = document.createElement('div');
  grid.style.cssText = 'display:flex;flex-wrap:wrap;gap:10px;padding:14px;overflow-y:auto;flex:1;justify-content:flex-start;align-content:flex-start;';

  const saved = savedLevels();
  const savedNames = new Set(saved.map(l=>l.name));
  const fromSeries = [];
  savedSeries().forEach(s=>{ s.levels.forEach(l=>{ if(!savedNames.has(l.name)){ fromSeries.push(l); savedNames.add(l.name); } }); });
  const allMaps = [...saved, ...fromSeries];

  // Get maps already in this series
  const targetSeries = savedSeries().find(s=>s.name===seriesName);
  const alreadyIn = new Set((targetSeries?.levels||[]).map(l=>l.name));

  const selected = new Set(alreadyIn); // start with already-added maps checked

  if(!allMaps.length){
    const empty = document.createElement('div');
    empty.style.cssText = "color:#555;font-size:14px;padding:30px;text-align:center;width:100%;";
    empty.textContent = 'No maps yet. Build something first!';
    grid.appendChild(empty);
  } else {
    allMaps.forEach(lv => {
      const card = document.createElement('div');
      const inSeries = alreadyIn.has(lv.name);
      card.style.cssText = `display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;width:calc(33.3% - 8px);min-width:80px;padding:6px;border-radius:4px;border:2px solid ${inSeries ? '#f5c842' : 'rgba(255,255,255,0.08)'};background:${inSeries ? 'rgba(245,200,66,0.08)' : 'rgba(255,255,255,0.03)'};box-sizing:border-box;transition:border-color 0.15s,background 0.15s;-webkit-tap-highlight-color:transparent;`;
      card.dataset.name = lv.name;

      // Thumbnail canvas
      const thumb = document.createElement('canvas');
      const TW = 80, TH = 72;
      thumb.width = TW; thumb.height = TH;
      thumb.style.cssText = 'border-radius:2px;display:block;width:100%;';

      // Draw thumbnail
      const tc = thumb.getContext('2d');
      tc.fillStyle = '#0a0a14';
      tc.fillRect(0,0,TW,TH);
      if(lv.bricks && lv.bricks.length){
        const cols = BRICK_COLS, rows = BRICK_ROWS;
        const bw = TW/cols, bh = TH/rows;
        lv.bricks.forEach(b=>{
          const col = b.col !== undefined ? b.col : Math.round(b.x/(b.w||BRICK_W));
          const row = b.row !== undefined ? b.row : Math.round(b.y/(b.h||BRICK_H));
          if(col<0||col>=cols||row<0||row>=rows) return;
          let color = b.color || '#888';
          if(b.isSteel)   color = '#8a9bb0';
          else if(b.isDiamond) color = '#00eeff';
          else if(b.isKey)    color = '#ffd700';
          else if(b.isLock)   color = '#b8860b';
          else if(b.isSkull)  color = '#333';
          else if(b.isBomb)   color = '#ff6600';
          else if(b.isReverse) color = '#9966cc';
          else if(b.isWhite)  color = '#e8e8f0';
          tc.fillStyle = b.isPaint ? color + 'aa' : color;
          tc.fillRect(col*bw+0.5, row*bh+0.5, bw-1, bh-1);
        });
      }

      // Checkmark overlay
      const check = document.createElement('div');
      check.style.cssText = `position:absolute;top:4px;right:4px;width:18px;height:18px;border-radius:50%;background:#f5c842;color:#000;font-size:11px;font-weight:700;display:${inSeries?'flex':'none'};align-items:center;justify-content:center;`;
      check.textContent = '✓';

      const wrap = document.createElement('div');
      wrap.style.cssText = 'position:relative;width:100%;';
      wrap.appendChild(thumb);
      wrap.appendChild(check);
      card.appendChild(wrap);

      const label = document.createElement('div');
      label.style.cssText = "color:#c9a84c;font-size:10px;text-align:center;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'Lato',sans-serif;";
      label.textContent = lv.name;
      card.appendChild(label);

      card.addEventListener('click', ()=>{
        if(selected.has(lv.name)){
          selected.delete(lv.name);
          card.style.borderColor = 'rgba(255,255,255,0.08)';
          card.style.background = 'rgba(255,255,255,0.03)';
          check.style.display = 'none';
        } else {
          selected.add(lv.name);
          card.style.borderColor = '#f5c842';
          card.style.background = 'rgba(245,200,66,0.08)';
          check.style.display = 'flex';
        }
      });

      grid.appendChild(card);
    });
  }
  panel.appendChild(grid);

  // Footer
  const footer = document.createElement('div');
  footer.style.cssText = 'padding:12px 14px;border-top:1px solid rgba(200,160,60,0.15);display:flex;gap:8px;flex-shrink:0;';
  const doneBtn = document.createElement('button');
  doneBtn.style.cssText = "flex:1;background:#2ec4b6;border:none;color:#000;font-family:'Lato',sans-serif;font-weight:700;font-size:14px;padding:11px;cursor:pointer;border-radius:3px;";
  doneBtn.textContent = 'Done';
  const cancelBtn = document.createElement('button');
  cancelBtn.style.cssText = "background:none;border:1px solid #444;color:#666;font-family:'Lato',sans-serif;font-weight:700;font-size:14px;padding:11px 16px;cursor:pointer;border-radius:3px;flex-shrink:0;";
  cancelBtn.textContent = 'Cancel';

  doneBtn.addEventListener('click', ()=>{
    const target = savedSeries().find(s=>s.name===seriesName);
    if(target){
      // Replace levels list with the selected set, preserving order of existing + appending new
      const existingOrder = target.levels.map(l=>l.name);
      const allMapsByName = {};
      allMaps.forEach(l=>{ allMapsByName[l.name]=l; });
      // Keep existing in order if still selected, then append newly added
      const kept = existingOrder.filter(n=>selected.has(n));
      const added = [...selected].filter(n=>!existingOrder.includes(n));
      target.levels = [...kept, ...added].map(n=>allMapsByName[n]).filter(Boolean);
      saveSeries(target);
      const addedCount = added.length;
      const removedCount = existingOrder.filter(n=>!selected.has(n)).length;
      let msg = addedCount ? `${addedCount} map${addedCount!==1?'s':''} added to "${seriesName}"` : `Series updated`;
      if(removedCount) msg += `, ${removedCount} removed`;
      showBuilderToast(msg);
    }
    ov.remove();
    if(onDone) onDone();
  });

  cancelBtn.addEventListener('click', ()=>ov.remove());
  footer.appendChild(doneBtn);
  footer.appendChild(cancelBtn);
  panel.appendChild(footer);

  ov.appendChild(panel);
  ov.addEventListener('click', e=>{ if(e.target===ov) ov.remove(); });
  document.body.appendChild(ov);
}

document.getElementById('builderSaveBtn').addEventListener('click',()=>{
  if(!builderBricks.length){ alert('Place some bricks first!'); return; }
  const ballPixX=builderBallPos.col*BRICK_W+BRICK_W/2;
  const ballPixY=builderBallPos.row*BRICK_H+BRICK_H/2;
  const saveable={ ballCol:builderBallPos.col, ballRow:builderBallPos.row, ballX:ballPixX, ballY:ballPixY, portal:null,
    bricks:builderBricks.map(b=>({
      col:b.col, row:b.row, x:b.col*BRICK_W, y:b.row*BRICK_H, w:BRICK_W, h:BRICK_H,
      color:b.color, isPaint:b.isPaint, isSteel:b.isSteel,
      isKey:b.isKey, isLock:b.isLock, isDiamond:b.isDiamond||false,
      isWhite:b.isWhite||false, isSkull:b.isSkull||false, isReverse:b.isReverse||false, isBomb:b.isBomb||false, hit:0, cooldown:0 })) };

  // If editing an existing level, warn before overwriting
  if(builderCurrentLevelName){
    // Check if the loaded map is owned by this user
    const loadedLevel = savedLevels().find(l=>l.name===builderCurrentLevelName);
    const loadedOwned = !loadedLevel || isOwnedMap(loadedLevel);

    if(!loadedOwned){
      // Shared map - can only save as copy
      pendingSaveBricks=saveable;
      document.getElementById('levelNameInput').value=`Copy of ${builderCurrentLevelName}`;
      document.getElementById('saveOverlay').style.display='flex';
      showBuilderToast('Shared map — saving as a copy');
      return;
    }

    const ov=document.createElement('div');
    ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:300;display:flex;align-items:center;justify-content:center;';
    ov.innerHTML=`<div style="background:#0f0f1a;border:2px solid #ffd700;padding:24px;font-family:'Press Start 2P',monospace;text-align:center;width:min(300px,88vw);">
      <div style="color:#ffd700;font-size:9px;line-height:2">Save changes?</div>
      <div style="color:#aaa;font-size:7px;margin-bottom:14px;line-height:1.8">This will replace<br>"${builderCurrentLevelName}"</div>

      <div style="display:flex;flex-direction:column;gap:8px;">
        <button id="saveOverwrite" style="background:#ffd700;border:none;color:#000;font-family:'Press Start 2P',monospace;font-size:8px;padding:10px;cursor:pointer;border-radius:3px;">💾 OVERWRITE</button>
        <button id="saveAsNew" style="background:#1a1a2e;border:2px solid #2ec4b6;color:#2ec4b6;font-family:'Press Start 2P',monospace;font-size:8px;padding:10px;cursor:pointer;border-radius:3px;">SAVE AS NEW</button>
        <button id="saveCancel" style="background:none;border:none;color:#888;font-family:'Press Start 2P',monospace;font-size:8px;cursor:pointer;padding:6px;">CANCEL</button>
      </div>
    </div>`;
    document.body.appendChild(ov);
    ov.querySelector('#saveOverwrite').addEventListener('click',()=>{
      ov.remove();
      saveLevel(builderCurrentLevelName, saveable);
      showBuilderToast(`"${builderCurrentLevelName}" saved!`);
    });
    ov.querySelector('#saveAsNew').addEventListener('click',()=>{
      ov.remove();
      pendingSaveBricks=saveable;
      document.getElementById('levelNameInput').value='';
      document.getElementById('saveOverlay').style.display='flex';
    });
    ov.querySelector('#saveCancel').addEventListener('click',()=>ov.remove());
  } else {
    openSaveDialog(saveable);
  }
});

});

function endGame(reason){
  if(gameOver) return;
  gameRunning=false; gameOver=true;
  const elapsed=ballLaunched?((performance.now()-gameStartTime)/1000):0;
  const timeScore=Math.max(100, Math.round(10000 - elapsed*100));
  score=timeScore; scoreDisplay.textContent=score;
  const timeStr=elapsed.toFixed(1)+'s';

  const card=(inner)=>`<div style="
    width:min(300px,88vw);
    background:linear-gradient(160deg,rgba(25,18,8,0.98),rgba(15,10,4,0.99));
    border:1px solid rgba(200,160,60,0.5);
    box-shadow:0 0 0 1px rgba(100,70,15,0.3),0 8px 40px rgba(0,0,0,0.85);
    border-radius:5px;padding:28px 22px;
    display:flex;flex-direction:column;align-items:center;gap:10px;
    font-family:'Lato',sans-serif;text-align:center;
  ">${inner}</div>`;

  if(reason==='dead'){
    showMessage(card(`
      <div style="font-size:40px;filter:drop-shadow(0 0 10px rgba(255,40,0,0.6))">💀</div>
      <div style="font-family:'Cinzel',serif;font-size:18px;color:#e55;letter-spacing:1px;text-shadow:0 0 12px rgba(220,50,30,0.5)">GAME OVER</div>
      <div style="color:rgba(180,140,80,0.65);font-size:12px">No lives remaining</div>
      <div style="display:flex;flex-direction:column;gap:8px;width:100%;margin-top:8px;">
        <button id="gameOverRetryBtn" style="width:100%;padding:13px;border-radius:3px;cursor:pointer;font-family:'Cinzel',serif;font-size:13px;font-weight:600;letter-spacing:0.5px;color:#ff8866;background:rgba(40,10,5,0.95);border:1px solid rgba(200,80,50,0.5);box-shadow:0 0 8px rgba(200,80,50,0.15);touch-action:manipulation;">↺ Try Again</button>
        <button id="gameOverMenuBtn" style="background:none;border:none;color:rgba(180,140,60,0.5);font-family:'Cinzel',serif;font-size:11px;cursor:pointer;letter-spacing:1px;padding:6px;touch-action:manipulation;">Main Menu</button>
      </div>
    `));
    document.getElementById('gameOverRetryBtn').addEventListener('click',()=>{ hideMessage(); restartGame(); });
    document.getElementById('gameOverMenuBtn').addEventListener('click',()=>{ hideMessage(); showModeSelect(); });
    return;
  }

  const isEscape=gameMode==='escape';
  const inSeries=activeSeries && !testingLevel;
  const hasNext=inSeries && activeSeriesIdx < activeSeries.levels.length-1;

  const icon = isEscape ? '💎' : '💥';
  const titleText = isEscape ? 'DIAMONDS!' : 'BLACK OUT!';
  const titleColor = isEscape ? '#7bbfff' : '#ff9966';
  const titleGlow = isEscape ? 'rgba(80,160,255,0.5)' : 'rgba(255,120,50,0.5)';
  const subText = isEscape ? 'All diamonds collected' : 'All bricks cleared';
  const seriesInfo = inSeries
    ? `<div style="color:rgba(180,140,60,0.55);font-size:11px">Map ${activeSeriesIdx+1} of ${activeSeries.levels.length} · ${activeSeries.name}</div>`
    : '';

  const btnStyle=(color,bg)=>`
    width:100%;padding:13px;border-radius:3px;cursor:pointer;
    font-family:'Cinzel',serif;font-size:13px;font-weight:600;letter-spacing:0.5px;
    color:${color};background:${bg};
    border:1px solid ${color}55;
    box-shadow:0 0 8px ${color}22;
    touch-action:manipulation;transition:transform 0.08s;
  `;
  const ghostBtn=`
    background:none;border:none;
    color:rgba(180,140,60,0.5);font-family:'Cinzel',serif;font-size:11px;
    cursor:pointer;letter-spacing:1px;padding:6px;touch-action:manipulation;
  `;

  // Series-complete banner (shown above buttons when last map in series)
  const seriesCompleteBanner = (inSeries && !hasNext)
    ? `<div style="font-family:'Cinzel',serif;font-size:15px;color:#f5c842;letter-spacing:1px;text-shadow:0 0 10px rgba(245,200,66,0.4)">🎉 Series Complete!</div>`
    : '';
  if(inSeries && !hasNext && activeSeries) clearSeriesProgress(activeSeries.name);

  // Middle CTA:
  // - Creator of this map → share it and challenge a friend
  // - Non-creator (played a received/series map) → prompt to build their own
  // - Series complete → prompt to build their own
  const isReceivedMap = currentLevelData && currentLevelData.creator_id && currentLevelData.creator_id !== CREATOR_ID;
  const isSeriesComplete = inSeries && !hasNext;
  const showBuildPrompt = isReceivedMap || isSeriesComplete;
  const buildPromptMsgs = [
    'Now build your own 🔨',
    'Think you can build a harder one? 🔨',
    'Your turn to build 🔨',
    'Make one that beats this 🔨',
  ];
  const buildPromptLabel = buildPromptMsgs[Math.floor(Math.random() * buildPromptMsgs.length)];
  const middleBtn = showBuildPrompt
    ? `<button id="endBuildBtn" style="${btnStyle('#f5c842','rgba(40,28,5,0.95)')}">${buildPromptLabel}</button>`
    : `<button id="endShareBtn" style="${btnStyle('#f5c842','rgba(40,28,5,0.95)')}">SHARE THIS MAP</button>`;

  // Always show the 3 CTAs on a win (except when testing in builder)
  let buttons='';
  if(testingLevel){
    buttons=`<button id="backToBuilderBtn" style="${btnStyle('#2ec4b6','rgba(5,30,30,0.9)')}">↩ Back to Builder</button>`;
  } else {
    buttons=`
      <button id="endNextBtn" style="${btnStyle('#2ec4b6','rgba(5,25,28,0.95)')}">▶ Next Level</button>
      ${middleBtn}
      <button id="endPlayAgainBtn" style="${btnStyle(titleColor,'rgba(10,15,30,0.95)')}">↺ Play It Again</button>
      <button id="endMenuBtn" style="${ghostBtn}">Home</button>
    `;
  }

  showMessage(card(`
    <div style="font-size:38px;filter:drop-shadow(0 0 10px ${titleGlow})">${icon}</div>
    <div style="font-family:'Cinzel',serif;font-size:20px;font-weight:700;color:${titleColor};letter-spacing:1px;text-shadow:0 0 12px ${titleGlow}">${titleText}</div>
    <div style="color:rgba(180,150,80,0.7);font-size:12px">${subText}</div>
    ${seriesInfo}
    ${seriesCompleteBanner}
    <div style="height:1px;background:linear-gradient(90deg,transparent,rgba(180,140,50,0.3),transparent);width:100%;margin:2px 0;"></div>
    <div style="display:flex;gap:20px;justify-content:center;">
      <div><div style="color:rgba(180,150,80,0.5);font-size:10px;font-family:'Cinzel',serif;letter-spacing:1px;margin-bottom:3px">TIME</div>
           <div style="color:#e8d5a0;font-size:16px;font-weight:700">${timeStr}</div></div>
      <div style="width:1px;background:rgba(180,140,50,0.2)"></div>
      <div><div style="color:rgba(180,150,80,0.5);font-size:10px;font-family:'Cinzel',serif;letter-spacing:1px;margin-bottom:3px">SCORE</div>
           <div style="color:#f5c842;font-size:16px;font-weight:700">${score}</div></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;width:100%;margin-top:4px;">
      ${buttons}
    </div>
  `));

  if(testingLevel){
    document.getElementById('backToBuilderBtn').addEventListener('click',()=>{
      testingLevel=false;
      builderBricks=builderBricksSnapshot.map(b=>({...b}));
      builderBallPos={...builderBallPosSnapshot};
      builderPortalPos=builderPortalPosSnapshot?{...builderPortalPosSnapshot}:null;
      hideMessage(); openBuilder();
    });
    return;
  }

  // Next Level
  document.getElementById('endNextBtn').addEventListener('click',()=>{
    if(hasNext){
      activeSeriesIdx++;
      saveSeriesProgress(activeSeries.name, activeSeriesIdx);
      hideMessage();
      startGame(activeSeries.levels[activeSeriesIdx]);
    } else {
      // No next level - go to menu so they can pick another
      activeSeries=null; activeSeriesIdx=0;
      hideMessage(); showModeSelect();
    }
  });

  // Build Your Own (shown instead of share on received maps)
  if(document.getElementById('endBuildBtn')){
    document.getElementById('endBuildBtn').addEventListener('click',()=>{
      hideMessage(); openBuilder();
    });
  }

  // Share This Map
  if(document.getElementById('endShareBtn')){
    document.getElementById('endShareBtn').addEventListener('click', async ()=>{
      const btn = document.getElementById('endShareBtn');
      const orig = btn.innerHTML; btn.innerHTML='⏳'; btn.disabled=true;
      try {
        const levelToShare = currentLevelData;
        if(!levelToShare || !levelToShare.name){ showToast('⚠️ Can\'t share random maps - save it first!'); btn.innerHTML=orig; btn.disabled=false; return; }
        let slug;
        try {
          slug = await upsertMapToCloud(levelToShare);
        } catch(uploadErr){
          console.warn('Cloud upload failed, using local slug:', uploadErr);
          slug = slugify(levelToShare.name);
        }
        showShareLinkOverlay('MAP SHARED!', getShareUrl(slug), levelToShare);
      } catch(e){
        console.error('Share failed:', e);
        showToast('⚠️ Share failed: ' + (e && e.message ? e.message.slice(0,60) : 'unknown error'));
      } finally {
        if(document.getElementById('endShareBtn')){ btn.innerHTML=orig; btn.disabled=false; }
      }
    });
  }

  // Play It Again
  document.getElementById('endPlayAgainBtn').addEventListener('click',()=>{
    hideMessage();
    restartGame();
  });

  // Home
  document.getElementById('endMenuBtn').addEventListener('click',()=>{
    activeSeries=null; activeSeriesIdx=0;
    hideMessage(); showModeSelect();
  });
}

// Message box tap - handle "tap to play again" when game is over
msgBox.addEventListener('click',(e)=>{
  if(e.target.closest('button,#endQuitBtn,#nextLevelBtn,#endNextBtn,#endShareBtn,#backToBuilderBtn,#endPlayAgainBtn,#endMenuBtn,#gameOverRetryBtn,#gameOverMenuBtn')) return;
  if(!gameOver) return;
  if(isRespawning) return; // respawn handler takes over
  if(testingLevel) return;
  if(activeSeries) return;
  // Tap anywhere on message = play again with same mode
  hideMessage();
  startGame(null, gameMode==='escape'?'escape':'blackout');
});

// Single unified canvas click handler
canvas.addEventListener('click',()=>{
  if(builderOpen) return;
  if(msgBox.style.display==='block') return; // message handles its own clicks
  if(!gameRunning) return;
  if(!paused&&!ballLaunched) launchBall();
});

  // Draw lock image on breakout icon - wait for image if not yet loaded

    const canvas = document.getElementById('breakoutIcon');
    if(!canvas) return;
    const img = BRICK_IMAGES['lock'];
    if(img && img.complete && img.naturalWidth>0){
      canvas.getContext('2d').drawImage(img, 0, 0, 40, 26);
    } else if(img){
      img.addEventListener('load', ()=>{
        const c2 = document.getElementById('breakoutIcon');
        if(c2) c2.getContext('2d').drawImage(img, 0, 0, 40, 26);
      }, { once: true });

  };
  requestAnimationFrame(()=>{
    drawBreakoutIcon();
    // Draw shooting ball on blackout icon
    const bc = document.getElementById('blackoutIcon');
    if(bc){
      const bctx = bc.getContext('2d');
      bctx.clearRect(0,0,40,26);
      // Motion trail
      const trailColors=['rgba(255,100,0,0.15)','rgba(255,140,0,0.25)','rgba(255,180,0,0.35)'];
      for(let i=0;i<3;i++){
        bctx.fillStyle=trailColors[i];
        bctx.beginPath();
        bctx.arc(12+i*5, 13, 5-i*0.8, 0, Math.PI*2);
        bctx.fill();
      }
      // Ball
      const bx=30, by=13, br=6;
      const grad=bctx.createRadialGradient(bx-br*0.3,by-br*0.35,0,bx,by,br);

      bctx.beginPath(); bctx.arc(bx,by,br,0,Math.PI*2); bctx.fill();
      bctx.strokeStyle='rgba(180,200,255,0.5)'; bctx.lineWidth=1;
      bctx.beginPath(); bctx.arc(bx,by,br,0,Math.PI*2); bctx.stroke();
      // Specular
      bctx.fillStyle='rgba(255,255,255,0.9)';
      bctx.beginPath(); bctx.arc(bx-br*0.3,by-br*0.3,br*0.25,0,Math.PI*2); bctx.fill();
    }
  });
}

// =====================================================================
// SERIES UTILITIES
// =====================================================================

function getSeriesProgress(seriesName){
  try { return parseInt(localStorage.getItem('pb_progress_'+seriesName)||'0'); } catch(e){ return 0; }
}
function saveSeriesProgress(seriesName, idx){
  try { localStorage.setItem('pb_progress_'+seriesName, idx); } catch(e){}
}
function clearSeriesProgress(seriesName){
  try { localStorage.removeItem('pb_progress_'+seriesName); } catch(e){}
}

function playSeries(s, fromIdx){
  activeSeries=s;
  activeSeriesIdx = fromIdx !== undefined ? fromIdx : getSeriesProgress(s.name);
  if(activeSeriesIdx >= s.levels.length) activeSeriesIdx=0;
  startGame(s.levels[activeSeriesIdx]);
}

function showToast(msg,color='#ffd700'){
  const t=document.createElement('div');
  t.style.cssText=`position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#0f0f1a;border:1px solid ${color};color:${color};font-family:'Press Start 2P',monospace;font-size:7px;padding:10px 16px;border-radius:4px;z-index:500;pointer-events:none;white-space:nowrap;`;
  t.textContent=msg; document.body.appendChild(t);
  setTimeout(()=>t.remove(),2200);
}

function getCurrentLevelData(){
  if(!builderBricks.length) return null;
  if(builderCurrentLevelName){
    const saved=savedLevels().find(l=>l.name===builderCurrentLevelName);

    if(saved) return saved;
  }
  return {
    name: builderCurrentLevelName||'Untitled',
    ballCol: builderBallPos.col,
    ballRow: builderBallPos.row,
    ballX: builderBallPos.col*BRICK_W+BRICK_W/2,
    ballY: builderBallPos.row*BRICK_H+BRICK_H/2,
    portal: null,
    bricks: builderBricks.map(b=>({
      col:b.col, row:b.row, x:b.col*BRICK_W,y:b.row*BRICK_H,w:BRICK_W,h:BRICK_H,
      color:b.color,isPaint:b.isPaint,isSteel:b.isSteel,isKey:b.isKey,isLock:b.isLock,
      isDiamond:b.isDiamond||false,isWhite:b.isWhite||false,isSkull:b.isSkull||false,isReverse:b.isReverse||false,isBomb:b.isBomb||false,hit:0,cooldown:0}))
  };
}

async function fetchCloudSeries() {
  const res = await fetch(`${SUPA_URL}/rest/v1/series?select=*&order=sort_order.asc`, {
    headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` }
  });
  if (!res.ok) throw new Error('Failed to fetch series');
  return await res.json();
}

async function upsertCloudSeries(series, sortOrder) {
  const slug = series.name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  const payload = {
    slug,
    name: series.name,
    description: series.description || '',
    levels: series.levels,
    sort_order: sortOrder
  };

  // Try PATCH first (update existing row by slug)
  const patch = await fetch(`${SUPA_URL}/rest/v1/series?slug=eq.${encodeURIComponent(slug)}`, {
    method: 'PATCH',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPA_KEY,
      'Authorization': `Bearer ${SUPA_KEY}`,
      'Prefer': 'return=representation'
    },
    body: JSON.stringify({ name: series.name, description: series.description || '', levels: series.levels, sort_order: sortOrder })
  });
  if (patch.ok) {
    const rows = await patch.json();
    if (rows && rows.length) return rows[0]; // updated existing row
  }

  // Row doesn't exist yet - INSERT
  const post = await fetch(`${SUPA_URL}/rest/v1/series`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPA_KEY,
      'Authorization': `Bearer ${SUPA_KEY}`,
      'Prefer': 'return=representation'
    },
    body: JSON.stringify(payload)
  });
  if (!post.ok) { const e = await post.text(); throw new Error(e); }
  return await post.json();
}

  // Fetch current levels
  const res = await fetch(`${SUPA_URL}/rest/v1/series?slug=eq.${encodeURIComponent(seriesSlug)}&select=levels`, {
    headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` }
  });
  if (!res.ok) throw new Error('Series not found');
  const rows = await res.json();
  if (!rows.length) throw new Error('Series not found');
  const levels = [...(rows[0].levels || []), levelData];
  const patch = await fetch(`${SUPA_URL}/rest/v1/series?slug=eq.${encodeURIComponent(seriesSlug)}`, {
    method: 'PATCH',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPA_KEY,
      'Authorization': `Bearer ${SUPA_KEY}`,
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify({ levels })
  });
  if (!patch.ok) { const e = await patch.text(); throw new Error(e); }
}

// Push hardcoded series to cloud on first run (safe to run repeatedly - upserts)
async function seedQuestToCloud() {
  for (let i = 0; i < HARDCODED_SERIES.length; i++) {
    await upsertCloudSeries(HARDCODED_SERIES[i], i);
  }
}

// Featured series name - persisted so it survives reloads
function getFeaturedSeriesName(){
  return LS.get('pb_featured_series') || (HARDCODED_SERIES[0] && HARDCODED_SERIES[0].name) || '';
}
function setFeaturedSeriesName(name){
  LS.set('pb_featured_series', name);
  // Reorder HARDCODED_SERIES so featured is always index 0
  const idx = HARDCODED_SERIES.findIndex(s=>s.name===name);
  if(idx>0){
    const [featured] = HARDCODED_SERIES.splice(idx,1);
    HARDCODED_SERIES.unshift(featured);
  }
}

// Load series: try cloud first, fall back to hardcoded
let ACTIVE_SERIES = [...HARDCODED_SERIES]; // starts as hardcoded

async function loadActiveSeries() {
  try {
    const cloud = await fetchCloudSeries();
    if (cloud && cloud.length) {
      ACTIVE_SERIES = cloud;
      // Keep hardcoded synced for local progress tracking
      HARDCODED_SERIES.length = 0;
      cloud.forEach(s => HARDCODED_SERIES.push(s));
    }
  } catch(e) {
    console.warn('Could not load cloud series, using hardcoded:', e);
  }
}

// Init: load cloud series then seed if empty — fully non-blocking
(function initSeries(){
  // Immediately save hardcoded to local storage
  HARDCODED_SERIES.forEach(hs=>{ deleteSeries(hs.name); saveSeries(hs); });
  // Restore stored featured series order
  const storedFeatured = LS.get('pb_featured_series');
  if(storedFeatured) setFeaturedSeriesName(storedFeatured);
  // Try to load from cloud in background - never blocks page load
  loadActiveSeries().catch(()=>{});
})();

// Kick off the game loop and show home screen
requestAnimationFrame(loop);
showModeSelect();

</script>
